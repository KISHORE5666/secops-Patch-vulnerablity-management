{% extends 'base.html' %}
{% block title %}Edit Asset{% endblock %}

{% block content %}
<h2>Edit Asset</h2>

<div class="card" style="max-width: 600px;">
    <form method="POST">
        <div class="form-group">
            <label>Asset Name</label>
            <input type="text" name="asset_name" value="{{ asset.asset_name }}" required>
        </div>
        <div class="form-group">
            <label>IP Address</label>
            <input type="text" name="ip_address" value="{{ asset.ip_address }}" required>
        </div>
        <div class="form-group">
            <label>Operating System</label>
            <input type="text" name="operating_system" value="{{ asset.operating_system }}" required>
        </div>
        <div class="form-group">
            <label>Owner</label>
            <input type="text" name="owner" value="{{ asset.owner }}" required>
        </div>
        <div class="form-group">
            <label>Asset Type</label>
            <select name="asset_type">
                <option value="server"      {% if asset.asset_type == 'server' %}selected{% endif %}>Server</option>
                <option value="workstation" {% if asset.asset_type == 'workstation' %}selected{% endif %}>Workstation</option>
                <option value="device"      {% if asset.asset_type == 'device' %}selected{% endif %}>Device</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('assets_list') }}" class="btn btn-secondary" style="margin-left:8px;">Cancel</a>
    </form>
</div>
{% endblock %}
