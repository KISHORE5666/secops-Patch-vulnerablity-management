{% extends 'base.html' %}
{% block title %}Add Asset{% endblock %}

{% block content %}
<h2>Add New Asset</h2>

<div class="card" style="max-width: 600px;">
    <form method="POST">
        <div class="form-group">
            <label>Asset Name</label>
            <input type="text" name="asset_name" placeholder="e.g. Web Server 01" required>
        </div>
        <div class="form-group">
            <label>IP Address</label>
            <input type="text" name="ip_address" placeholder="e.g. 192.168.1.10" required>
        </div>
        <div class="form-group">
            <label>Operating System</label>
            <input type="text" name="operating_system" placeholder="e.g. Windows Server 2019" required>
        </div>
        <div class="form-group">
            <label>Owner</label>
            <input type="text" name="owner" placeholder="e.g. IT Department" required>
        </div>
        <div class="form-group">
            <label>Asset Type</label>
            <select name="asset_type">
                <option value="server">Server</option>
                <option value="workstation">Workstation</option>
                <option value="device">Device</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Add Asset</button>
        <a href="{{ url_for('assets_list') }}" class="btn btn-secondary" style="margin-left:8px;">Cancel</a>
    </form>
</div>
{% endblock %}
